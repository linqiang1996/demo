<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FOF看板登录</title>
  <style>
    :root {
      --bg: linear-gradient(160deg, #eef6ff 0%, #fff7ed 50%, #ecfccb 100%);
      --card: rgba(255, 255, 255, 0.9);
      --line: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --muted: #475569;
      --accent: #0f766e;
      --danger: #b91c1c;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .card {
      width: min(420px, calc(100% - 32px));
      padding: 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      font-size: 15px;
      background: #fff;
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    .error {
      margin-top: 14px;
      color: var(--danger);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <form class="card" method="post">
    <h1>FOF净值跟踪</h1>
    <p>输入访问口令后即可查看网站和手机端数据。</p>
    <input type="hidden" name="next" value="{{ next_url }}">
    <label for="access_code">访问口令</label>
    <input id="access_code" name="access_code" type="password" placeholder="请输入访问口令" autocomplete="current-password">
    <button type="submit">登录</button>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </form>
</body>
</html>
